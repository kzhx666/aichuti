<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>《建筑材料》AI 专属出题系统</title>
    <link rel="stylesheet" href="./assets/index.min.css" />
    <link rel="stylesheet" href="./assets/katex.min.css" />
    <script src="./assets/vue.global.prod.js"></script>
    <script src="./assets/katex.min.js"></script>
    <script src="./assets/auto-render.min.js"></script>
    <script src="./assets/index.full.min.js"></script>
    <script src="./assets/axios.min.js"></script>
    <script src="./assets/marked.min.js"></script>
    <style>
        body { margin: 0; background-color: #f5f7fa; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; height: 100vh; }
        .app-container { max-width: 1400px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); }
        .header-title { text-align: center; color: #409EFF; margin-bottom: 30px; }
        .exam-result { background: #f8f9fa; padding: 20px; border-radius: 4px; border: 1px solid #e4e7ed; min-height: 500px; white-space: pre-wrap; font-family: monospace; overflow-y: auto; max-height: 600px;}
        .status-box { background: #1e1e1e; color: #67C23A; padding: 15px; border-radius: 5px; font-family: monospace; margin-bottom: 15px; font-size: 13px; max-height: 150px; overflow-y: auto; box-shadow: inset 0 0 10px #000; }
        .point-tag { display: none !important; }
        .card-header-flex { display: flex; justify-content: space-between; align-items: center; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2b3a4a; }
        .login-card { width: 400px; padding: 20px; text-align: center; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .login-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #303133; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <script type="text/plain" id="default-prompt-text">
# Role (角色)
你是一位资深的中职院校《建筑材料》与土木工程专业教师，拥有丰富的现场工程经验和教学经验。你的任务是根据我每次对话提供的知识点，自动生成高质量、结合实际工程的考试试卷。

# Task (任务)
请为我生成一套总分为 100 分的《建筑材料》考试试卷。
题目数量分布极其严格：
1. 单选题：10 道（每题 3 分，仅1个正确答案）
2. 判断题：15 道（每题 2 分，仅“正确”或“错误”）
3. 多选题：10 道（每题 4 分，至少2个正确答案）
4. 题目需要考察学生的实际应用能力、对易混淆概念的辨析，而不是死记硬背。
5. 题目直接从## 一、单选题（共10题，每题3分，共30分）开始，不需要前面的标题这些
6. 题目序号从1开始，逐题增加，例如1-35这样，不要每个大题又从1号开始标注。

# Core Requirements (核心出题要求)
1. 深度解析标准：每道题的解析必须具备极高的教学价值。不仅要讲清楚正确选项为什么对，必须逐一拆解所有错误选项，明确指出错误选项为什么错，或者说明该错误选项中的材料/概念在现实中其实适用于哪种其他场景，解析语言必须直截了当、客观严谨，绝对禁止使用任何比喻、拟人等修辞手法（如“老大哥”、“脱下铠甲”等），直接用专业术语讲清核心知识点即可。
2. 答案随机与试卷质量：保证35道题目考点全覆盖且绝对不能重复。单选的 ABCD 和多选的各种答案组合出现频率要均衡，判断题的“正确”与“错误”比例需控制在 1:1 左右。
3. 考点提炼（核心学情数据）：为了配合后台的学情分析系统，你必须为每一道题精准提炼出一个核心知识点短语（例如：砂浆保水性、硅酸盐水泥初凝、珍珠岩绝热性等）。
4. 出题紧抓考点 ：在题目中把考点知识抓住，不要出现地区名称
5. 【数学公式与符号规范】：凡是涉及物理量符号（如 $\rho$、$f_{cu}$）、计算公式或化学方程式的，必须严格使用 LaTeX 格式。行内公式使用 $...$ 包裹，独立公式使用 $$...$$ 包裹。例如：$f_{cu} = \frac{F}{A}$。

# Constraint (极其严苛的格式与防错约束)
⚠️ 最高级别警告（违反将导致系统报错）：
1. 【强制 Markdown 代码块包裹】：你生成的所有试卷内容，必须全部包裹在一个唯一的 Markdown 代码块中输出。你的回复必须且只能以 ```markdown 开头，以 ``` 结尾。代码块外部绝对禁止出现任何寒暄、总结等闲聊废话。
2. 【禁用引用标记】：严禁在输出中包含任何形式的引文标记或引用脚注，例如：[1] 等。输出必须是干净、纯粹的教学文字。
3. 【解析绝对单行】：<details> 标签块内部（含答案与解析）严禁出现任何物理换行符（回车键）。
4. 【隐藏考点标签】：必须在 <b>答案：</b>[选项] 之后，插入一个隐藏的 span 标签来记录知识点，格式严格为：<span class="point-tag" style="display:none;" data-point="[本题核心考点]"></span>。
5. 【HTML 结构】：必须严格遵循拼装（绝对不能换行）：<details><summary>🔎 点击查看答案与解析</summary><blockquote><b>答案：</b>[选项]<span class="point-tag" style="display:none;" data-point="[核心考点]"></span><br><b>解析：</b>[内容]</blockquote></details>
6. 【分段逻辑】：解析内容如需分段，必须且只能使用 <br>，绝对禁止敲击回车。

# 试卷格式模板（必须在代码块内体现）
## 1. 单选题格式
**[题号]. [单选]** [结合实际工程背景的题干]
A. [选项1]
B. [选项2]
C. [选项3]
D. [选项4]
<details><summary>🔎 点击查看答案与解析</summary><blockquote><b>答案：</b>[正确字母]<span class="point-tag" style="display:none;" data-point="[核心考点]"></span><br><b>解析：</b>[单行解析内容，严禁引用标记，严禁换行]</blockquote></details>

## 2. 判断题格式
**[题号]. [判断]** [结合实际工程背景的题干]
正确
错误
<details><summary>🔎 点击查看答案与解析</summary><blockquote><b>答案：</b>[正确/错误]<span class="point-tag" style="display:none;" data-point="[核心考点]"></span><br><b>解析：</b>[单行解析内容，严禁引用标记，严禁换行]</blockquote></details>

## 3. 多选题格式
**[题号]. [多选]** [结合实际工程背景的题干]
A. [选项1]
B. [选项2]
C. [选项3]
D. [选项4]
<details><summary>🔎 点击查看答案与解析</summary><blockquote><b>答案：</b>[连续大写字母]<span class="point-tag" style="display:none;" data-point="[核心考点]"></span><br><b>解析：</b>[单行解析内容，严禁引用标记，严禁换行]</blockquote></details>
    </script>

    <div id="app" v-cloak>
        <div v-if="!isLoggedIn" class="login-container">
            <el-card class="login-card">
                <div class="login-title">🔒 AI教务出题系统</div>
                <el-input v-model="loginPassword" type="password" placeholder="请输入密码" show-password size="large" @keyup.enter="handleLogin"></el-input>
                <el-button type="primary" size="large" style="width: 100%; margin-top: 25px;" @click="handleLogin">进入系统</el-button>
            </el-card>
        </div>

        <div v-else class="app-container">
            <h1 class="header-title">🛠️ 建筑材料 AI 命题中心 (全净输出版)</h1>
            <el-tabs v-model="activeTab">
                <el-tab-pane label="🤖 AI 智能出题" name="exam">
                    <el-row :gutter="20">
                        <el-col :span="9">
                            <el-card shadow="hover">
                                <template #header><span>🎯 出题控制台</span></template>
                                <el-form label-position="top">
                                    <el-form-item label="1. 指定出题范围 (文件夹)">
                                        <el-select v-model="examForm.category" placeholder="请选择资料" style="width: 100%;">
                                            <el-option v-for="item in folders" :key="item" :label="item" :value="item"></el-option>
                                        </el-select>
                                    </el-form-item>
                                    
                                    <el-form-item label="2. OCR 图文扫描引擎">
                                        <el-switch v-model="examForm.useOcr" active-text="开启 (提取图片文字)" inactive-text="关闭 (极速模式)"></el-switch>
                                    </el-form-item>

                                    <el-form-item label="3. 核心出题提示词">
                                        <el-input type="textarea" :rows="14" v-model="examForm.promptTemplate"></el-input>
                                        <el-button type="info" link @click="resetPrompt" style="float: right; margin-top: 5px;">🔄 恢复默认提示词</el-button>
                                    </el-form-item>
                                    <el-button type="primary" style="width: 100%; height: 50px;" @click="generateExam" :loading="isGenerating">
                                        {{ isGenerating ? '🚀 系统运行中，详见右侧监控...' : '🚀 一键生成 100分 试卷' }}
                                    </el-button>
                                </el-form>
                            </el-card>
                        </el-col>
                        <el-col :span="15">
                            <div v-if="statusLog" id="status-box-container" class="status-box">
                                {{ statusLog }}
                            </div>

                            <el-card shadow="hover">
                                <template #header>
                                    <div class="card-header-flex">
                                        <span>📄 纯净试卷输出区</span>
                                        <div>
                                            <el-button type="primary" size="small" @click="downloadWord('student')" :disabled="!rawMarkdown || isGenerating">📥 下载学生版</el-button>
                                            <el-button type="danger" size="small" @click="downloadWord('teacher')" :disabled="!rawMarkdown || isGenerating">📥 下载教师版</el-button>
                                            <el-button type="success" size="small" @click="copyMarkdown" :disabled="!rawMarkdown || isGenerating">📋 一键复制</el-button>
                                        </div>
                                    </div>
                                </template>
                                <div id="markdown-container" class="exam-result" v-html="parsedMarkdown || '等待生成...'"></div>
                            </el-card>
                        </el-col>
                    </el-row>
                </el-tab-pane>
                
                <el-tab-pane label="📚 资料管理" name="docs">
                    <div style="background:#f0f9eb; padding:15px; margin-bottom:10px; border-radius:5px; display:flex; align-items:center;">
                        📂 <el-input v-model="newFolderName" placeholder="新分类" style="width:200px; margin:0 10px;"></el-input>
                        <el-button type="success" @click="addFolder">新建分类</el-button>
                    </div>
                    
                    <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
                        <el-select v-model="uploadFolder" placeholder="请选择要操作的文件夹" style="flex:1;">
                            <el-option v-for="item in folders" :key="item" :label="item" :value="item"></el-option>
                        </el-select>
                        <el-button type="danger" @click="deleteFolder" :disabled="!uploadFolder">🗑️ 彻底删除该分类</el-button>
                    </div>

                    <el-upload drag action="/api/upload_docs/" multiple :data="{category: uploadFolder}" v-model:file-list="serverFileList" :on-success="()=>fetchFiles(uploadFolder)" :before-remove="handleRemove">
                        <div class="el-upload__text">拖拽文件上传 (支持 Word/PDF/扫描件，最大 500MB)</div>
                    </el-upload>
                </el-tab-pane>
                
                <el-tab-pane label="⚙️ API 配置" name="settings">
                    <el-form label-width="100px">
                        <el-form-item label="API URL"><el-input v-model="config.apiUrl"></el-input></el-form-item>
                        <el-form-item label="API Key"><el-input v-model="config.apiKey" type="password" show-password></el-input></el-form-item>
                        <el-form-item label="模型名称"><el-input v-model="config.modelName"></el-input></el-form-item>
                        <el-button type="primary" @click="verifyApi" :loading="isVerifying">⚡ 验证连接</el-button>
                        <el-button type="success" @click="saveSettings">💾 保存配置</el-button>
                    </el-form>
                </el-tab-pane>
            </el-tabs>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, watch, nextTick, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const promptEl = document.getElementById('default-prompt-text');
                const DEFAULT_PROMPT = promptEl ? promptEl.textContent.trim() : '';

                const isLoggedIn = ref(sessionStorage.getItem('auth_token') === 'true');
                const loginPassword = ref('');
                const handleLogin = () => {
                    if (loginPassword.value === '123456') { isLoggedIn.value = true; sessionStorage.setItem('auth_token', 'true'); } 
                    else { ElementPlus.ElMessage.error('密码错误'); }
                };

                const activeTab = ref('exam');
                const isGenerating = ref(false);
                const isVerifying = ref(false);
                const rawMarkdown = ref('');
                const statusLog = ref('');
                
                const folders = ref([]); 
                const newFolderName = ref('');
                const uploadFolder = ref('');
                const serverFileList = ref([]);
                const config = ref({ apiUrl: localStorage.getItem('api_url') || '', apiKey: localStorage.getItem('api_key') || '', modelName: localStorage.getItem('model_name') || '' });
                
                const examForm = ref({ 
                    category: '', 
                    useOcr: localStorage.getItem('use_ocr') === 'true',
                    promptTemplate: localStorage.getItem('custom_prompt_v7') || DEFAULT_PROMPT 
                });

                const fetchFolders = async () => {
                    try {
                        const res = await axios.get('/api/list_folders/', { params: { _t: Date.now() } });
                        if (res.data.folders && res.data.folders.length > 0) {
                            folders.value = res.data.folders;
                        }
                    } catch (e) {}
                };

                onMounted(() => { if (isLoggedIn.value) fetchFolders(); });
                watch(isLoggedIn, (val) => { if (val) fetchFolders(); });

                const fetchFiles = async (cat) => {
                    if (!cat) { serverFileList.value = []; return; }
                    try {
                        const res = await axios.get('/api/list_docs/', { params: { category: cat, _t: Date.now() } });
                        serverFileList.value = res.data.files;
                    } catch (e) {}
                };
                watch(uploadFolder, fetchFiles);

                const handleRemove = async (uploadFile) => {
                    if (!uploadFolder.value) return false;
                    try {
                        await ElementPlus.ElMessageBox.confirm(`确定要从服务器硬盘彻底删除文件【${uploadFile.name}】吗？`, '警告', { confirmButtonText: '彻底删除', cancelButtonText: '取消', type: 'warning' });
                        await axios.post('/api/delete_doc/', { category: uploadFolder.value, filename: uploadFile.name });
                        ElementPlus.ElMessage.success('文件物理删除成功！');
                        return true; 
                    } catch (e) {
                        return false; 
                    }
                };

                let renderTimeout = null;
                const renderMath = () => {
                    if (renderTimeout) clearTimeout(renderTimeout);
                    renderTimeout = setTimeout(() => {
                        nextTick(() => {
                            const el = document.getElementById('markdown-container');
                            if (el && window.renderMathInElement) {
                                renderMathInElement(el, { delimiters: [ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false} ], throwOnError : false });
                            }
                            if(isGenerating.value && el) { el.scrollTop = el.scrollHeight; }
                        });
                    }, 500);
                };
                watch(rawMarkdown, renderMath);

                const getCleanMarkdown = () => {
                    let cleanText = rawMarkdown.value || '';
                    cleanText = cleanText.replace(/```[a-zA-Z]*\n?/gi, '').replace(/```/g, '');
                    cleanText = cleanText.replace(/\n*❌\s*AI\s*在出题过程中报错[\s\S]*$/gi, '');
                    return cleanText.trim();
                };

                const downloadWord = async (mode) => {
                    try {
                        ElementPlus.ElMessage.info('正在生成 Word 排版，请稍候...');
                        let cleanText = getCleanMarkdown();
                        const res = await axios.post('/api/download_word/', { markdown_text: cleanText, mode: mode }, { responseType: 'blob' });
                        const url = window.URL.createObjectURL(new Blob([res.data]));
                        const link = document.createElement('a'); link.href = url;
                        link.setAttribute('download', mode === 'student' ? '试卷_学生版.docx' : '试卷_教师版.docx'); link.click();
                        ElementPlus.ElMessage.success('下载成功！');
                    } catch (error) {
                        ElementPlus.ElMessage.error('生成 Word 失败，格式混淆严重！');
                    }
                };

                const deleteFolder = async () => {
                    if (!uploadFolder.value) return;
                    try {
                        await ElementPlus.ElMessageBox.confirm(`确定要彻底删除分类【${uploadFolder.value}】及文件吗？`, '警告', { confirmButtonText: '彻底删除', cancelButtonText: '取消', type: 'error' });
                        await axios.post('/api/delete_folder/', { category: uploadFolder.value });
                        
                        await fetchFolders(); 
                        
                        if (examForm.value.category === uploadFolder.value) examForm.value.category = '';
                        uploadFolder.value = ''; serverFileList.value = [];
                        ElementPlus.ElMessage.success('分类已彻底删除！');
                    } catch (e) {
                        if (e !== 'cancel') ElementPlus.ElMessage.error('删除失败，请检查网络');
                    }
                };

                const addFolder = async () => { 
                    const folderName = newFolderName.value.trim();
                    if (!folderName) return;
                    try {
                        await axios.post('/api/create_folder/', { category: folderName });
                        await fetchFolders(); 
                        uploadFolder.value = folderName;
                        examForm.value.category = folderName;
                        ElementPlus.ElMessage.success('分类创建成功！');
                    } catch (e) {
                        ElementPlus.ElMessage.error('创建分类失败');
                    }
                    newFolderName.value = ''; 
                };

                const generateExam = async () => {
                    if (!examForm.value.category) return ElementPlus.ElMessage.warning('请选择资料文件夹');
                    if (!config.value.apiUrl || !config.value.apiKey || !config.value.modelName) {
                        ElementPlus.ElMessage.warning('请先去【API 配置】填写完整配置！');
                        activeTab.value = 'settings';
                        return;
                    }

                    isGenerating.value = true; 
                    statusLog.value = ''; 
                    rawMarkdown.value = '';
                    let isExamContent = false;
                    localStorage.setItem('custom_prompt_v7', examForm.value.promptTemplate);
                    localStorage.setItem('use_ocr', examForm.value.useOcr);
                    
                    try {
                        const payload = { 
                            api_url: String(config.value.apiUrl || ''), 
                            api_key: String(config.value.apiKey || ''), 
                            model_name: String(config.value.modelName || ''), 
                            category: String(examForm.value.category || ''), 
                            prompt_template: String(examForm.value.promptTemplate || ''),
                            use_ocr: Boolean(examForm.value.useOcr)
                        };

                        const response = await fetch('/api/generate_exam/', {
                            method: 'POST', 
                            headers: { 
                                'Content-Type': 'application/json',
                                'Accept': 'application/json, text/plain, */*'
                            }, 
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            let errorDetail = `HTTP ${response.status}`;
                            try {
                                const errData = await response.json();
                                errorDetail += ` | 详细原因: ${JSON.stringify(errData.detail || errData)}`;
                            } catch (parseErr) {}
                            throw new Error(errorDetail);
                        }

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder('utf-8');

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            let chunk = decoder.decode(value, { stream: true });

                            if (!isExamContent) {
                                statusLog.value += chunk;
                                if (statusLog.value.includes('---\n\n')) {
                                    isExamContent = true;
                                    let parts = statusLog.value.split('---\n\n');
                                    statusLog.value = parts[0] + '✅ 试卷正在疯狂打印中，请看下方区域...';
                                    rawMarkdown.value = parts[1] || '';
                                }
                                nextTick(() => {
                                    let el = document.getElementById('status-box-container');
                                    if(el) el.scrollTop = el.scrollHeight;
                                });
                            } else {
                                rawMarkdown.value += chunk;
                            }
                        }
                        ElementPlus.ElMessage.success('试卷生成完毕！快去下载 Word 吧！');
                    } catch (e) { 
                        statusLog.value += '\n\n❌ 请求被拦截：' + e.message;
                    } finally { 
                        isGenerating.value = false; 
                    }
                };

                const copyMarkdown = async () => {
                    let cleanText = getCleanMarkdown();
                    try { await navigator.clipboard.writeText(cleanText); ElementPlus.ElMessage.success('复制成功！'); } 
                    catch (err) { const t = document.createElement('textarea'); t.value = cleanText; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); ElementPlus.ElMessage.success('复制成功！'); }
                };

                const verifyApi = async () => {
                    if (!config.value.apiUrl) return ElementPlus.ElMessage.error('请填写完整信息');
                    isVerifying.value = true;
                    try {
                        const res = await axios.post('/api/verify_api/', { api_url: config.value.apiUrl, api_key: config.value.apiKey, model_name: config.value.modelName });
                        if (res.data.status === 'success') ElementPlus.ElMessage.success(res.data.message);
                        else ElementPlus.ElMessage.error(res.data.message);
                    } catch (e) { ElementPlus.ElMessage.error('网络请求失败'); } finally { isVerifying.value = false; }
                };

                const parsedMarkdown = computed(() => {
                    return marked.parse(getCleanMarkdown());
                });

                const saveSettings = () => { localStorage.setItem('api_url', config.value.apiUrl); localStorage.setItem('api_key', config.value.apiKey); localStorage.setItem('model_name', config.value.modelName); ElementPlus.ElMessage.success('配置已保存');};
                const resetPrompt = () => { examForm.value.promptTemplate = DEFAULT_PROMPT; localStorage.removeItem('custom_prompt_v7'); ElementPlus.ElMessage.success('已恢复默认约束！'); };

                return { isLoggedIn, loginPassword, handleLogin, activeTab, isGenerating, isVerifying, rawMarkdown, statusLog, folders, newFolderName, uploadFolder, serverFileList, config, examForm, generateExam, parsedMarkdown, addFolder, saveSettings, resetPrompt, downloadWord, deleteFolder, fetchFiles, copyMarkdown, verifyApi, handleRemove };
            }
        });
        app.use(ElementPlus); app.mount('#app');
    </script>
