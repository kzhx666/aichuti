version: '3'
services:
  aichuti_backend:
    build: ./backend
    container_name: aichuti_backend
    volumes:
      # 【核心】打通任督二脉，把容器里的文件实打实存到VPS硬盘上
      - ./backend/uploads:/app/uploads
    restart: always

  aichuti_frontend:
    image: nginx:alpine
    container_name: aichuti_frontend
    ports:
      - "3003:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      # 映射静态资源目录
      - ./frontend/assets:/usr/share/nginx/html/assets
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - aichuti_backend
    restart: always
